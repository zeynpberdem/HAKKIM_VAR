<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şikayet Haritası — Hakkım Var</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #060813; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.9rem 2.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(6,8,19,0.92);
  backdrop-filter: blur(12px);
  flex-shrink: 0; z-index: 1000; position: relative;
}
.logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
.logo-text { font-size: 20px; font-weight: 700; color: white; }
.logo-text span { color: #a78bfa; }
.back-btn { font-size: 13px; color: rgba(255,255,255,0.45); cursor: pointer; text-decoration: none; }
.back-btn:hover { color: #a78bfa; }

.map-header {
  padding: 1rem 2.5rem;
  background: rgba(6,8,19,0.7);
  border-bottom: 1px solid rgba(109,40,217,0.15);
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; z-index: 999; position: relative;
}
.map-title { font-size: 16px; font-weight: 700; }
.map-subtitle { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

.stats-row { display: flex; gap: 1rem; }
.stat-pill {
  background: rgba(109,40,217,0.15);
  border: 1px solid rgba(109,40,217,0.25);
  border-radius: 20px; padding: 0.3rem 0.9rem;
  font-size: 12px; color: #c4b5fd;
}
.stat-pill span { font-weight: 700; color: #a78bfa; }

.filters {
  display: flex; gap: 8px; padding: 0.8rem 2.5rem;
  background: rgba(6,8,19,0.5);
  border-bottom: 1px solid rgba(109,40,217,0.1);
  flex-wrap: wrap; flex-shrink: 0;
  position: relative; z-index: 998;
}
.filter-btn {
  padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 12px;
  cursor: pointer; border: 1px solid rgba(109,40,217,0.25);
  background: rgba(109,40,217,0.08); color: rgba(255,255,255,0.6);
  transition: all 0.2s;
}
.filter-btn.active {
  background: rgba(109,40,217,0.3); border-color: rgba(109,40,217,0.6);
  color: #c4b5fd; font-weight: 600;
}

#map { flex: 1; z-index: 1; }

.legend {
  position: absolute; bottom: 2rem; right: 1rem;
  background: rgba(6,8,19,0.9); border: 1px solid rgba(109,40,217,0.25);
  border-radius: 12px; padding: 0.8rem 1rem; z-index: 1000;
  font-size: 11px;
}
.legend-title { font-weight: 600; margin-bottom: 0.5rem; color: #c4b5fd; }
.legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: rgba(255,255,255,0.7); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.loading {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; z-index: 999;
}
.loading-spinner {
  width: 40px; height: 40px; border: 3px solid rgba(109,40,217,0.3);
  border-top-color: #a78bfa; border-radius: 50%;
  animation: spin 1s linear infinite; margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="9" fill="url(#lg)"/>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="36" y2="36"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#0891b2"/></linearGradient></defs>
      <rect x="9" y="8" width="18" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
      <rect x="9" y="13" width="18" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
      <rect x="9" y="18" width="12" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
      <circle cx="24" cy="26" r="5" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
      <path d="M22 26l1.5 1.5L26.5 24" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text">Hakkım <span>Var</span></span>
  </a>
  <a class="back-btn" href="index.html">← Ana Sayfaya Dön</a>
</nav>

<div class="map-header">
  <div>
    <div class="map-title">🗺️ Şikayet Haritası</div>
    <div class="map-subtitle">Bölgelerdeki yoğun şikayetleri görün</div>
  </div>
  <div class="stats-row">
    <div class="stat-pill">Toplam: <span id="totalCount">-</span></div>
    <div class="stat-pill">Mahalle: <span id="activeRegions">-</span></div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-cat="all">Tümü</button>
  <button class="filter-btn" data-cat="Su Kesintisi">💧 Su Kesintisi</button>
  <button class="filter-btn" data-cat="Sokak Aydınlatması">💡 Sokak Lambası</button>
  <button class="filter-btn" data-cat="Bozuk Yol">🚧 Bozuk Yol</button>
  <button class="filter-btn" data-cat="Çöp Sorunu">🗑️ Çöp Sorunu</button>
  <button class="filter-btn" data-cat="Elektrik Kesintisi">⚡ Elektrik</button>
  <button class="filter-btn" data-cat="Park Sorunu">🌳 Park</button>
</div>

<div id="map">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div style="color:rgba(255,255,255,0.5);font-size:13px;">Şikayetler yükleniyor...</div>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Şehir Yoğunluğu</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Yüksek (50+ şikayet)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Orta (10-49 şikayet)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Düşük (1-9 şikayet)</div>
  <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);">
    <div class="legend-title" style="margin-bottom:6px;">Şikayet Kategorisi</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Su Kesintisi</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Sokak Lambası</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Bozuk Yol</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Çöp Sorunu</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div> Elektrik</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div> Park Sorunu</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script>
const SUPABASE_URL = "https://zbmjvadlqnodkazzmbmg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpibWp2YWRscW5vZGthenptYm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjEwODUsImV4cCI6MjA4OTY5NzA4NX0.6eh4ES6nUGSFbxUJ0Xb1qTltYMKW5n8qvf1o13k8pcM";

const CITY_COORDS = {
  "Elazığ":    [38.6681911, 39.1811152],
  "Diyarbakır":[37.9196142, 40.2323251],
  "Malatya":   [38.348587,  38.2942352],
  "Erzincan":  [39.748577,  39.4791762],
  "Tunceli":   [39.106704,  39.548229]
};

let map, heatLayer, markerLayer;
let allComplaints = [];
let neighLookup = {}; // "CİTY|mahallename" → [lat, lng]

map = L.map('map', { center: [38.8, 39.2], zoom: 7 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
markerLayer = L.layerGroup().addTo(map);

// Yerel neighbourhoods.json'dan koordinat tablosu oluştur
async function loadNeighLookup() {
  try {
    const res = await fetch('./data/neighbourhoods.json');
    if (!res.ok) return;
    const data = await res.json();
    for (const [city, mahalles] of Object.entries(data)) {
      const cityKey = city.toLocaleLowerCase('tr-TR');
      for (const m of mahalles) {
        const nameKey = m.name.toLocaleLowerCase('tr-TR');
        neighLookup[`${cityKey}|${nameKey}`] = [m.lat, m.lng];
      }
    }
  } catch(e) {}
}

function getLocalCoords(neighbourhood, city) {
  if (!neighbourhood) return null;
  const cityKey = city.toLocaleLowerCase('tr-TR');
  const nameKey = neighbourhood.toLocaleLowerCase('tr-TR')
    .replace(/\s*(mahallesi|mahalle|mah\.|mah|mh\.)\s*/gi, '').trim();
  return neighLookup[`${cityKey}|${nameKey}`] || null;
}

function getGroupCoords(neighbourhood, city) {
  // 1. Yerel JSON'dan bak
  const local = getLocalCoords(neighbourhood, city);
  if (local) return local;
  // 2. Şehir koordinatına küçük jitter ile fall back
  const cc = CITY_COORDS[city];
  if (!cc) return null;
  return [cc[0] + (Math.random()-0.5)*0.06, cc[1] + (Math.random()-0.5)*0.06];
}

const CAT_COLOR = {
  "Su Kesintisi":      "#3b82f6",
  "Sokak Aydınlatması":"#f59e0b",
  "Bozuk Yol":         "#ef4444",
  "Çöp Sorunu":        "#22c55e",
  "Elektrik Kesintisi":"#a855f7",
  "Park Sorunu":       "#06b6d4",
};

function renderMap(complaints) {
  markerLayer.clearLayers();
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }

  // Mahalle bazında grupla
  const groups = {};
  for (const c of complaints) {
    const mah = (c.neighbourhood || '').trim();
    const key = `${c.city}|${c.district}|${mah}`;
    if (!groups[key]) {
      groups[key] = { city: c.city, district: c.district, neighbourhood: mah || null, items: [] };
    }
    groups[key].items.push(c);
  }

  const heatPoints = [];

  for (const group of Object.values(groups)) {
    // Koordinat: önce yerel JSON, sonra şehir fallback
    const coords = getGroupCoords(group.neighbourhood, group.city);
    if (!coords) continue;

    const count = group.items.length;
    let color, label;
    if (count >= 50)      { color = "#ef4444"; label = "Yüksek"; }
    else if (count >= 10) { color = "#f59e0b"; label = "Orta"; }
    else                  { color = "#3b82f6"; label = "Düşük"; }
    const radius = Math.max(6, Math.min(22, 5 + count * 2));

    // Kategori dağılımı popup için
    const catCounts = {};
    for (const c of group.items) catCounts[c.category] = (catCounts[c.category] || 0) + 1;
    const catRows = Object.entries(catCounts)
      .sort((a,b) => b[1]-a[1])
      .map(([cat, n]) => `<div style="display:flex;justify-content:space-between;gap:12px;font-size:11px;color:#555;">
        <span>${cat}</span><span style="font-weight:600;">${n}</span></div>`)
      .join('');

    const label_mah = group.neighbourhood
      ? group.neighbourhood.replace(/\b\w/g, l => l.toUpperCase())
      : `${group.district} (mahalle bilinmiyor)`;

    const marker = L.circleMarker(coords, {
      radius, fillColor: color,
      color: "white", weight: 2, opacity: 0.9, fillOpacity: 0.5
    });
    marker.bindPopup(`
      <div style="font-family:system-ui;min-width:190px;">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px;">${label_mah}</div>
        <div style="font-size:11px;color:#888;margin-bottom:6px;">${group.district} / ${group.city}</div>
        <div style="margin-bottom:6px;display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:${color};color:white;">${count} şikayet · ${label}</div>
        <div style="border-top:1px solid #eee;padding-top:6px;">${catRows}</div>
      </div>
    `);
    markerLayer.addLayer(marker);

    heatPoints.push([coords[0], coords[1], count]);
  }

  if (heatPoints.length > 0) {
    const maxCount = Math.max(...heatPoints.map(p => p[2]), 1);
    heatLayer = L.heatLayer(heatPoints, {
      radius: 35, blur: 25, maxZoom: 10, max: maxCount,
      gradient: { 0.2: '#3b82f6', 0.45: '#f59e0b', 0.7: '#ef4444' }
    }).addTo(map);
  }
}

function updateStats(complaints) {
  document.getElementById('totalCount').textContent = complaints.length;
  const uniqueMah = new Set(complaints.map(c => `${c.city}|${c.district}|${(c.neighbourhood||'').trim()}`));
  document.getElementById('activeRegions').textContent = uniqueMah.size;
}

async function loadComplaints() {
  try {
    await loadNeighLookup();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/complaints?select=*&order=created_at.desc`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    allComplaints = data || [];
    document.getElementById('loading').style.display = 'none';
    renderMap(allComplaints);
    updateStats(allComplaints);
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:rgba(255,255,255,0.4);">Veriler yüklenemedi.</div>';
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    const filtered = cat === "all" ? allComplaints : allComplaints.filter(c => c.category === cat);
    renderMap(filtered);
    updateStats(filtered);
  });
});

loadComplaints();
</script>
</body>
</html>
